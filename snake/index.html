<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Snake - 2 Jugadores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Juego de Snake - 2 Jugadores</h1>
        <div class="game-info">
            <div class="score">
                <p>Jugador 1 (Flechas): <span id="score1">0</span></p>
                <p>Jugador 2 (WASD): <span id="score2">0</span></p>
            </div>
            <div class="controls">
                <p><strong>Controles:</strong></p>
                <p>Jugador 1: Flechas del teclado</p>
                <p>Jugador 2: WASD</p>
                <button id="startBtn">Iniciar Juego</button>
                <button id="resetBtn">Reiniciar</button>
            </div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="gameOver" class="hidden">
            <h2>¡Juego Terminado!</h2>
            <p id="winnerMessage"></p>
            <button id="playAgainBtn">Jugar de Nuevo</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
